services:
  backend:
    build: ./backend
    environment:
      SINDRI_PASSWORD: ${SINDRI_PASSWORD:?set SINDRI_PASSWORD in .env}
      SINDRI_REMOTE_EXEC_ENABLED: ${SINDRI_REMOTE_EXEC_ENABLED:-false}
      # "auto" tries claude CLI, then codex CLI, then the Anthropic API key
      # below -- whichever is actually available. See docs/AI_FEATURES.md.
      SINDRI_AI_PROVIDER_MODE: ${SINDRI_AI_PROVIDER_MODE:-auto}
      SINDRI_ANTHROPIC_API_KEY: ${SINDRI_ANTHROPIC_API_KEY:-}
      # Requires the docker.sock mount below to actually work -- read
      # docs/SANDBOX.md before turning this on, it's a real trust
      # trade-off, not a free safety win.
      SINDRI_SANDBOX_ENABLED: ${SINDRI_SANDBOX_ENABLED:-false}
    volumes:
      - sindri-data:/data
      # Mount whatever script folders you want to be able to scan/import
      # from the "Prehľadať priečinok" tab. Add more read-only lines like
      # this one for every extra directory you want reachable -- paths
      # here are IN-CONTAINER paths, type the same path in the UI.
      - ./import-sources:/import-sources:ro
      # Optional -- only needed for AI generate/review via an existing
      # claude/codex CLI login instead of an API key. All commented out by
      # default: uncomment on a host that actually has these installed and
      # logged in. Mirrors Muninn's ai_engine container mounts; see
      # docs/AI_FEATURES.md for why each path is (:ro) or read-write.
      # - ${HOME}/.claude:/home/sindri/.claude:ro
      # - ${HOME}/.claude.json:/home/sindri/.claude.json:ro
      # - ${SINDRI_CLAUDE_BIN_HOST_PATH}:/usr/local/bin/claude:ro
      # - ${HOME}/.codex:/home/sindri/.codex
      # - ${SINDRI_CODEX_BIN_HOST_PATH}:/usr/local/bin/codex:ro
      #
      # Optional -- "Testovať v sandboxe" (isolated one-off container per
      # run, see docs/SANDBOX.md). Grants the backend the ability to talk
      # to the host's Docker daemon (Docker-outside-of-Docker), which is
      # itself host-root-equivalent power -- only uncomment this on a
      # host you trust to run this backend with that level of access.
      # - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${SINDRI_PORT:-8420}:80"
    restart: unless-stopped

volumes:
  sindri-data:
