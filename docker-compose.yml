services:
  backend:
    build: ./backend
    environment:
      SINDRI_PASSWORD: ${SINDRI_PASSWORD:?set SINDRI_PASSWORD in .env}
      SINDRI_REMOTE_EXEC_ENABLED: ${SINDRI_REMOTE_EXEC_ENABLED:-false}
      # "auto" tries claude CLI, then codex CLI, then the Anthropic API key
      # below -- whichever is actually available. See docs/AI_FEATURES.md.
      SINDRI_AI_PROVIDER_MODE: ${SINDRI_AI_PROVIDER_MODE:-auto}
      SINDRI_ANTHROPIC_API_KEY: ${SINDRI_ANTHROPIC_API_KEY:-}
      # Requires the docker.sock mount below to actually work -- read
      # docs/SANDBOX.md before turning this on, it's a real trust
      # trade-off, not a free safety win.
      SINDRI_SANDBOX_ENABLED: ${SINDRI_SANDBOX_ENABLED:-false}
      # claude/codex are installed as version-pinned standalone binaries
      # reached through a symlink (e.g. ~/.local/bin/claude ->
      # ~/.local/share/claude/versions/2.1.215) -- mounting just the
      # symlink's current target would break silently on the next
      # auto-update. Simplest robust fix: mirror the real host paths
      # inside the container (same absolute paths, not remapped under
      # /home/sindri) so every symlink in ~/.local/bin resolves exactly
      # like it does on the host, version bumps included.
      HOME: ${HOME}
      PATH: ${HOME}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - sindri-data:/data
      # Mount whatever script folders you want to be able to scan/import
      # from the "Prehľadať priečinok" tab. Add more read-only lines like
      # this one for every extra directory you want reachable -- paths
      # here are IN-CONTAINER paths, type the same path in the UI.
      - ./import-sources:/import-sources:ro
      # AI generate/review via an existing claude/codex CLI login instead
      # of an API key. Mirrors Muninn's ai_engine container mounts; see
      # docs/AI_FEATURES.md for why each path is (:ro) or read-write, and
      # the HOME/PATH override above for why these mirror host paths
      # exactly instead of remapping under /home/sindri.
      - ${HOME}/.claude:${HOME}/.claude:ro
      - ${HOME}/.claude.json:${HOME}/.claude.json:ro
      - ${HOME}/.local/bin:${HOME}/.local/bin:ro
      - ${HOME}/.local/share/claude:${HOME}/.local/share/claude:ro
      - ${HOME}/.codex:${HOME}/.codex
      #
      # Optional -- "Testovať v sandboxe" (isolated one-off container per
      # run, see docs/SANDBOX.md). Grants the backend the ability to talk
      # to the host's Docker daemon (Docker-outside-of-Docker), which is
      # itself host-root-equivalent power -- only uncomment this on a
      # host you trust to run this backend with that level of access.
      # - /var/run/docker.sock:/var/run/docker.sock
      #
      # Real remote execution over SSH to registered managed machines
      # (docs/REMOTE_EXEC.md). Mounts the host's existing SSH keys
      # read-only -- the app only ever uses a key already here, it never
      # generates or stores one. Only the "add machine" form's dropdown
      # (GET /api/machines/available-keys) reads this path; SSH itself
      # only touches whichever single key file the registered machine
      # points at.
      - ${HOME}/.ssh:/home/sindri/.ssh-host:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${SINDRI_PORT:-8420}:80"
    restart: unless-stopped

volumes:
  sindri-data:
