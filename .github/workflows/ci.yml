name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Separate from the backend/frontend jobs above on purpose: those check
  # "does our code work", this checks "do our dependencies have known
  # CVEs" -- different question, different failure meaning, shouldn't be
  # mixed into the same job/log.
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: pip-audit (backend dependencies)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend dependencies)
        working-directory: frontend
        run: npm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Prepare a CI-only .env
        run: |
          cp .env.example .env
          # Belt-and-suspenders: the high-risk features already default to
          # off in docker-compose.yml, but pin them explicitly here so a
          # future default change can't silently turn this into a job that
          # builds/starts the stack with SSH exec, the Docker-socket
          # sandbox, or a real AI provider reachable.
          {
            echo "SINDRI_REMOTE_EXEC_ENABLED=false"
            echo "SINDRI_SANDBOX_ENABLED=false"
            echo "SINDRI_AI_PROVIDER_MODE=auto"
            echo "SINDRI_ANTHROPIC_API_KEY="
          } >> .env
      - run: docker compose config -q
      - run: docker compose build
